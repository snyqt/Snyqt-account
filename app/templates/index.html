<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少年友晴天-统一账户认证系统</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/icon/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme-toggle.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-middle1) 50%, var(--bg-gradient-middle2) 50%, var(--bg-gradient-end) 100%);
            opacity: var(--bg-gradient-opacity);
            z-index: -1;
        }

        .header {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 15px 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--card-border);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            background: var(--primary-bg);
            color: var(--text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .login-btn:hover {
            background: var(--primary-bg-hover);
            transform: translateY(-2px);
            box-shadow: var(--primary-shadow);
        }

        .header:hover {
            box-shadow: var(--card-shadow);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 80px;
            width: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: var(--primary-shadow);
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 10px;
        }

        .content-section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .content-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
        }

        .content-section:hover {
            transform: translateY(-3px);
            box-shadow: var(--primary-shadow);
            background: var(--card-bg);
        }

        .content-section h2 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 28px;
            position: relative;
            padding-bottom: 10px;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
            border-radius: 3px;
        }

        .content-section p {
            color: var(--secondary-text);
            font-size: 16px;
            line-height: 1.8;
        }

        .menu-section {
            border: 2px dashed var(--card-border);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 30px 0;
            background: var(--card-bg);
            transition: all 0.3s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .menu-section:hover {
            border-color: var(--bg-gradient-start);
            box-shadow: var(--primary-shadow);
            transform: translateY(-3px);
            background: var(--card-bg);
        }

        .menu-section h2 {
            color: var(--text-color);
            margin-bottom: 15px;
            font-size: 26px;
        }

        .menu-section p {
            color: var(--secondary-text);
            font-size: 16px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--primary-shadow);
            border-color: var(--bg-gradient-start);
            background: var(--card-bg);
        }

        .feature-icon {
            font-size: 36px;
            color: var(--text-color);
            margin-bottom: 15px;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .feature-card:hover .feature-icon {
            transform: scale(1.1);
            color: var(--danger-color);
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .feature-card p {
            color: var(--secondary-text);
            font-size: 14px;
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
            color: var(--secondary-text);
            font-size: 14px;
            background: var(--card-bg);
            border-top: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .user-profile {
            position: relative;
            display: inline-block;
        }

        .avatar-container {
            position: relative;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .avatar-container:hover {
            background-color: var(--primary-shadow);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: var(--primary-shadow);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            min-width: 200px;
            margin-top: 10px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            cursor: pointer;
        }

        .username-item {
            font-weight: 600;
            color: var(--text-color);
        }

        .userid-item {
            color: var(--secondary-text);
            font-size: 13px;
        }

        .dropdown-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .dropdown-item.profile-item {
            padding: 12px 20px;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: none;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .dropdown-item.permission-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .dropdown-item.permission-item {
            padding: 12px 20px;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: none;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .dropdown-item.login-log-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .dropdown-item.login-log-item {
            padding: 12px 20px;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: none;
            width: 100%;
            text-decoration: none;
            display: block;
        }

        .dropdown-item.profile-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .logout-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            color: var(--secondary-text);
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
        }

        .logout-btn:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 5px 0;
        }

        .login-btn {
            padding: 10px 20px;
            background: var(--danger-bg);
            color: var(--text-color);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--danger-shadow);
            background: var(--danger-bg-hover);
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
            }

            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .header-title {
                font-size: 1.2rem;
            }

            .user-avatar {
                width: 60px;
                height: 60px;
            }

            .feature-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .feature-card {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .header-title {
                font-size: 18px;
            }

            .content-section h2 {
                font-size: 24px;
            }

            .menu-section h2 {
                font-size: 22px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-section,
        .menu-section,
        .feature-card {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .content-section {
            animation-delay: 0.2s;
        }

        .menu-section {
            animation-delay: 0.4s;
        }

        .feature-card:nth-child(1) { animation-delay: 0.6s; }
        .feature-card:nth-child(2) { animation-delay: 0.7s; }
        .feature-card:nth-child(3) { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo-link">
                <img src="/static/img/logo.png" alt="少年友晴天-统一账户认证系统" class="logo">
            </a>
            <h1 class="header-title">少年友晴天-统一账户认证系统</h1>
        </div>
        <div class="header-right">
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
            <a href="/login" class="login-btn" id="login-btn">登录</a>

            <div class="user-profile" id="user-profile" style="display: none;">
                <div class="avatar-container">
                    <img src="" alt="用户头像" class="user-avatar" id="user-avatar">
                </div>
                <div class="dropdown-menu" id="dropdown-menu">
            <div class="dropdown-item username-item" id="dropdown-username"></div>
            <div class="dropdown-item userid-item" id="dropdown-userid"></div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item profile-item" id="profile-item">个人信息</div>
            <div class="dropdown-item permission-item" id="permission-item">权限管理</div>
            <div class="dropdown-item login-log-item" id="login-log-item">登录日志</div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item logout-btn" id="logout-btn">退出登录</button>
        </div>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="content-section">
            <h2>欢迎使用统一账户认证系统</h2>
            <p>以科技化的方式，无限进步！</p>
        </section>

        <div class="feature-grid">
            <div class="feature-card" id="user-management-card" style="display: none;">
                <div class="feature-icon"><i class="fas fa-users"></i></div>
                <h3 class="feature-title">用户权限管理</h3>
                <p>管理用户权限申请和审核</p>
            </div>
            <div class="feature-card" id="user-info-management-card" style="display: none;">
                <div class="feature-icon"><i class="fas fa-list"></i></div>
                <h3 class="feature-title">用户信息管理</h3>
                <p>管理所有用户账户信息</p>
            </div>
            <div class="feature-card" id="login-log-management-card" style="display: none;">
                <div class="feature-icon"><i class="fas fa-history"></i></div>
                <h3 class="feature-title">登录日志管理</h3>
                <p>查看所有用户的登录日志记录</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 少年友晴天-统一账户认证系统 | 以科技化的方式，无限进步！</p>
    </footer>

    <script>
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.style.padding = '10px 20px';
                header.style.boxShadow = 'var(--card-shadow)';
            } else {
                header.style.padding = '15px 20px';
                header.style.boxShadow = 'var(--card-shadow)';
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const avatarContainer = document.querySelector('.avatar-container');
            const dropdownMenu = document.getElementById('dropdown-menu');
            const logoutBtn = document.getElementById('logout-btn');

            function checkUserLoginStatus() {
                const userInfo = localStorage.getItem('userInfo');

                if (userInfo) {
                    try {
                        const user = JSON.parse(userInfo);
                        document.getElementById('dropdown-username').textContent = user.username || '用户';
                        document.getElementById('dropdown-userid').textContent = `ID: ${user.id || 'N/A'}`;

                        if (user.avatar) {
                            document.getElementById('user-avatar').src = user.avatar;
                        } else {
                            document.getElementById('user-avatar').src = '/static/img/default_avatar.svg';
                        }

                        loginBtn.style.display = 'none';
                        userProfile.style.display = 'inline-block';
                    } catch (e) {
                        console.error('解析用户信息失败:', e);
                        loginBtn.style.display = 'inline-block';
                        userProfile.style.display = 'none';
                    }
                } else {
                    loginBtn.style.display = 'inline-block';
                    userProfile.style.display = 'none';
                }
            }

            checkUserLoginStatus();

            if (avatarContainer) {
                avatarContainer.addEventListener('click', function() {
                    dropdownMenu.classList.toggle('active');
                });
            }

            document.addEventListener('click', function(event) {
                if (userProfile && !userProfile.contains(event.target)) {
                    dropdownMenu.classList.remove('active');
                }
            });

            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    localStorage.removeItem('userInfo');
                    checkUserLoginStatus();
                    dropdownMenu.classList.remove('active');
                });
            }

            document.getElementById('profile-item').addEventListener('click', function() {
                window.location.href = '/profile';
                dropdownMenu.classList.remove('active');
            });

            document.getElementById('permission-item').addEventListener('click', function() {
                window.location.href = '/permission';
                dropdownMenu.classList.remove('active');
            });

            document.getElementById('login-log-item').addEventListener('click', function() {
                window.location.href = '/user-login-logs';
                dropdownMenu.classList.remove('active');
            });

            function checkAdminPermission() {
                const userInfo = localStorage.getItem('userInfo');
                if (userInfo) {
                    const user = JSON.parse(userInfo);
                    fetch('/check-admin-permission', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ user_id: user.id })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.isAdmin) {
                            const userManagementCard = document.getElementById('user-management-card');
                            if (userManagementCard) {
                                userManagementCard.style.display = 'block';
                                userManagementCard.addEventListener('click', function() {
                                    window.location.href = '/user_permission_management';
                                });
                            }

                            const userInfoManagementCard = document.getElementById('user-info-management-card');
                            if (userInfoManagementCard) {
                                userInfoManagementCard.style.display = 'block';
                                userInfoManagementCard.addEventListener('click', function() {
                                    window.location.href = '/user_info_management';
                                });
                            }

                            const loginLogManagementCard = document.getElementById('login-log-management-card');
                            if (loginLogManagementCard) {
                                loginLogManagementCard.style.display = 'block';
                                loginLogManagementCard.addEventListener('click', function() {
                                    window.location.href = '/admin-login-logs';
                                });
                            }
                        }
                    })
                    .catch(error => {
                        console.error('检查管理员权限失败:', error);
                    });
                }
            }

            checkAdminPermission();

            checkUserPermissionManagementPermission();
        });

        function checkUserPermissionManagementPermission() {
            const userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                const user = JSON.parse(userInfo);
                fetch('/check-user-permission-management-permission', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.hasPermissionManagementPermission) {
                        const userManagementCard = document.getElementById('user-management-card');
                        if (userManagementCard) {
                            userManagementCard.style.display = 'block';
                            userManagementCard.addEventListener('click', function() {
                                window.location.href = '/user_permission_management';
                            });
                        }
                    }
                })
                .catch(error => {
                    console.error('检查用户权限管理权限失败:', error);
                });
            }
        }
    </script>
    <script src="/static/js/theme-toggle.js"></script>
</body>
</html>
