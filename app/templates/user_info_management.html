<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息管理 - 少年友晴天-统一账户认证系统</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="/static/css/icon/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme-toggle.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <!-- 立即加载主题切换脚本，防止白闪 -->
    <script src="/static/js/theme-toggle.js"></script>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 黄昏海边背景渐变 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-middle1) 50%, var(--bg-gradient-middle2) 50%, var(--bg-gradient-end) 100%);
            opacity: var(--bg-gradient-opacity);
            z-index: -1;
        }
        
        /* 头部样式 */
        .header {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 15px 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--card-border);
        }
        
        .header:hover {
            box-shadow: 0 3px 15px var(--card-shadow);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            height: 80px;
            width: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
        }
        
        /* Logo链接样式 */
        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }
        
        .header-right {
            display: flex;
            align-items: center;
        }
        
        /* 用户头像和下拉菜单 */
        .user-profile {
            position: relative;
            display: inline-block;
        }
        
        .avatar-container {
            position: relative;
            display: inline-block;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            min-width: 200px;
            margin-top: 10px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item {
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-color);
            transition: background-color 0.2s ease, color 0.2s ease;
            cursor: pointer;
            text-align: left;
        }

        .username-item {
            font-weight: 600;
            color: var(--text-color);
        }

        .userid-item {
            color: var(--secondary-text);
            font-size: 13px;
        }

        .dropdown-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }
        
        .dropdown-divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 5px 0;
        }
        
        .logout-btn {
            color: var(--secondary-text) !important;
            width: calc(100% - 10px);
            text-align: left;
            border: none;
            background: none;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            padding: 12px 20px;
            transition: all 0.2s ease;
            display: block;
        }
        
        .logout-btn:hover {
            color: var(--danger-color);
            background-color: rgba(255, 158, 125, 0.1);
        }
        
        /* 主容器 */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 10px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .content-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--card-shadow);
            padding: 25px;
            width: 100%;
            max-width: 1400px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .content-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--primary-shadow);
            background: var(--card-bg);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-color);
            border-left: 4px solid var(--bg-gradient-start);
            padding-left: 15px;
        }
        
        /* 搜索区域 */
        .search-container {
            margin-bottom: 30px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }
        
        .search-form {
            display: flex;
            gap: 15px;
            align-items: end;
            flex-wrap: wrap;
        }
        
        .search-form .form-group {
            flex: 1;
            min-width: 200px;
            margin-bottom: 0; /* 移除底部边距以保持对齐 */
        }
        
        /* 确保所有form-input在搜索表单中的高度一致 */
        .search-form .form-input {
            height: 48px; /* 固定高度 */
            box-sizing: border-box; /* 确保内边距不影响总高度 */
        }
        
        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        .data-table th {
            background-color: var(--primary-shadow);
            font-weight: 600;
            color: var(--text-color);
        }
        
        .data-table tbody tr:hover {
            background-color: var(--primary-shadow);
        }
        
        .user-avatar-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--card-border);
        }
        
        /* 搜索区域样式补充 */
        .search-form .search-button-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 0;
            flex: 0 0 auto; /* 不自动伸展，保持按钮宽度合适 */
        }
        
        .search-form .search-button-container label {
            margin-bottom: 8px;
            visibility: hidden;
            height: 16px; /* 确保空label与其他label高度一致 */
            display: block;
        }
        
        /* 确保查询按钮与输入框高度完全一致 */
        .search-form .btn-primary {
            height: 48px; /* 与输入框高度一致 */
            padding: 0 20px; /* 调整内边距，保持内容居中 */
            box-sizing: border-box; /* 确保内边距不影响总高度 */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 操作按钮组 */
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 8px 12px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            background-color: var(--card-border);
        }
        
        .action-btn.primary {
            background: var(--danger-bg-hover);
            color: white;
            border-color: var(--bg-gradient-middle2);
        }
        
        .action-btn.primary:hover {
            background: var(--danger-bg);
            box-shadow: 0 4px 12px rgba(255, 158, 125, 0.3);
        }
        
        .action-btn.secondary {
            background: var(--primary-bg);
            color: white;
            border-color: var(--bg-gradient-start);
        }
        
        .action-btn.secondary:hover {
            background: var(--primary-bg-hover);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        .action-btn.warning {
            background: rgba(255, 158, 125, 0.1);
            color: var(--danger-color);
            border-color: var(--bg-gradient-middle2);
        }
        
        .action-btn.warning:hover {
            background: rgba(255, 158, 125, 0.2);
            box-shadow: 0 4px 12px rgba(255, 158, 125, 0.2);
        }
        
        .action-btn.danger {
            background: var(--primary-shadow);
            color: var(--bg-gradient-start);
            border-color: var(--bg-gradient-start);
        }
        
        .action-btn.danger:hover {
            background: rgba(184, 196, 255, 0.2);
            box-shadow: 0 4px 12px rgba(184, 196, 255, 0.2);
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px var(--primary-shadow);
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--secondary-text);
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background-color: var(--card-border);
            color: var(--text-color);
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: var(--card-bg);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--bg-gradient-start);
            box-shadow: 0 0 0 3px var(--primary-shadow);
            background-color: var(--card-bg);
        }
        
        .form-input.error {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 3px rgba(255, 158, 125, 0.1);
        }
        
        .form-input.success {
            border-color: var(--bg-gradient-start);
            box-shadow: 0 0 0 3px var(--primary-shadow);
        }
        
        .error-message {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 5px;
            min-height: 18px;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            align-items: end;
        }
        
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        .send-code-btn {
            background: var(--primary-bg);
            color: var(--text-color);
            border: 1px solid var(--bg-gradient-start);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .send-code-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--primary-shadow);
            background: var(--primary-bg-hover);
        }
        
        .send-code-btn:disabled {
            background: var(--card-border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border-color: var(--card-border);
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--card-border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
            transition: width 0.3s ease;
        }
        
        .password-strength-bar.weak {
            width: 33%;
        }
        
        .password-strength-bar.medium {
            width: 66%;
        }
        
        .password-strength-bar.strong {
            width: 100%;
        }
        
        .password-hint {
            margin-top: 5px;
            font-size: 14px;
            color: var(--secondary-text);
        }
        
        /* 按钮样式 */
        .btn {
            padding: 12px 20px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: var(--danger-bg-hover);
            color: white;
            border-color: var(--bg-gradient-middle2);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--danger-shadow);
            background: var(--danger-bg);
        }
        
        .btn-secondary {
            background: var(--primary-bg);
            color: white;
            border-color: var(--bg-gradient-start);
        }
        
        .btn-secondary:hover {
            background: var(--primary-bg-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        .btn-cancel {
            background: transparent;
            color: white;
            border-color: var(--card-border);
        }
        
        .btn-cancel:hover {
            background: var(--primary-shadow);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        /* 头像上传区域 */
        .avatar-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border: 2px dashed var(--card-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: var(--card-bg);
        }
        
        .avatar-upload-area:hover {
            background-color: var(--primary-shadow);
            border-color: var(--bg-gradient-start);
        }
        
        .upload-icon {
            font-size: 48px;
            color: var(--secondary-text);
            opacity: 0.7;
        }
        
        .upload-text {
            font-size: 16px;
            color: var(--text-color);
            text-align: center;
        }
        
        .upload-note {
            font-size: 14px;
            color: var(--secondary-text);
        }
        
        #avatar-upload-input {
            display: none;
        }
        
        .preview-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--text-color);
        }
        
        /* 成功提示 */
        .success-message {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary-bg);
            color: var(--text-color);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--primary-shadow);
            z-index: 3000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            font-size: 14px;
        }
        
        .success-message.active {
            transform: translateX(0);
        }
        
        .error-message-display {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--danger-bg-hover);
            color: var(--text-color);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(255, 158, 125, 0.3);
            z-index: 3000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            font-size: 14px;
        }
        
        .error-message-display.active {
            transform: translateX(0);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .container {
                padding: 20px 10px;
            }
            
            .content-card {
                padding: 20px;
            }
            
            .data-table th,
            .data-table td {
                padding: 10px;
                font-size: 14px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 5px;
            }
            
            .action-btn {
                width: 100%;
            }
            
            .search-form {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                align-items: flex-end;
            }
            
            .search-form .search-button-container {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                margin-bottom: 0;
                /* 确保按钮容器与其他输入框高度一致 */
                height: fit-content;
                flex: 0 0 auto; /* 不自动伸展 */
            }
            
            .search-form .search-button-container label {
                margin-bottom: 8px;
                visibility: hidden;
                /* 确保空label与其他label高度一致 */
                height: 16px;
                display: block;
            }
            
            .search-form .search-button-container .btn-primary {
                padding: 10px 20px; /* 调整按钮内边距与输入框一致 */
                height: 40px; /* 确保按钮高度与输入框一致 */
                box-sizing: border-box; /* 确保内边距不影响总高度 */
            }
        }
        /* 移动端响应式设计 */
        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
                align-items: stretch;
            }
        }
        
        /* Footer样式 */
        .footer {
            background: var(--card-bg);
            color: var(--secondary-text);
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
            font-size: 14px;
            box-shadow: 0 -2px 10px var(--primary-shadow);
            border-top: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .footer p {
            margin: 0;
        }

    </style>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo-link">
                <img src="/static/img/logo.png" alt="系统Logo" class="logo">
            </a>
            <h1 class="header-title">少年友晴天-统一账户认证系统</h1>
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
        <div class="header-right">
            <button id="login-btn" class="btn btn-primary">登录</button>
            <div id="user-profile" class="user-profile" style="display: none;">
                <div class="avatar-container" id="avatar-container">
                    <img id="user-avatar" src="/static/img/default_avatar.svg" alt="用户头像" class="user-avatar">
                </div>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item username-item" id="dropdown-username">用户</div>
                    <div class="dropdown-item userid-item" id="dropdown-userid">ID: N/A</div>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item logout-btn" id="logout-btn">退出登录</button>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="content-card">
            <h2 class="card-title">用户信息</h2>
            
            <!-- 搜索区域 -->
            <div class="search-container">
                <form id="search-form" class="search-form">
                    <div class="form-group">
                        <label for="search-user-id">用户ID</label>
                        <input type="text" id="search-user-id" class="form-input" placeholder="请输入用户ID">
                    </div>
                    <div class="form-group">
                        <label for="search-username">用户名</label>
                        <input type="text" id="search-username" class="form-input" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="search-email">用户邮箱</label>
                        <input type="email" id="search-email" class="form-input" placeholder="请输入用户邮箱">
                    </div>
                    <div class="form-group search-button-container">
                        <label></label> <!-- 添加空label保持对齐 -->
                        <button type="submit" class="btn btn-primary">查询</button>
                    </div>
                </form>
            </div>
            
            <!-- 用户列表表格 -->
            <table id="users-table" class="data-table">
                <thead>
                    <tr>

            </div>
            <p style="margin-bottom: 20px; color: var(--text-color);">您确定要删除用户 <strong id="delete-username"></strong> 吗？此操作将删除该用户的所有信息、权限和登录日志，且无法撤销。</p>
            <input type="hidden" id="delete-user-id">
            <div class="btn-group">
                <button type="button" class="btn btn-cancel" onclick="closeDeleteUserModal()">取消</button>

    <script>
        // 添加页面滚动效果
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.style.padding = '10px 40px';
                header.style.boxShadow = '0 6px 25px var(--card-shadow)';
            } else {
                header.style.padding = '15px 40px';
                header.style.boxShadow = '0 4px 20px var(--card-shadow)';
            }
        });
        
        // 用户登录状态检查和下拉菜单交互
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const avatarContainer = document.querySelector('.avatar-container');
            const dropdownMenu = document.getElementById('dropdown-menu');
            const logoutBtn = document.getElementById('logout-btn');
            
            // 检查用户登录状态
            function checkUserLoginStatus() {
                // 从本地存储中获取用户信息
                const userInfo = localStorage.getItem('userInfo');
                
                if (userInfo) {
                    try {
                        const user = JSON.parse(userInfo);
                        // 显示用户信息
                        document.getElementById('dropdown-username').textContent = user.username || '用户';
                        document.getElementById('dropdown-userid').textContent = `ID: ${user.id || 'N/A'}`;
                        
                        // 设置用户头像
                        if (user.avatar) {
                            document.getElementById('user-avatar').src = user.avatar;
                        } else {
                            // 设置默认头像
                        document.getElementById('user-avatar').src = '/static/img/user_avatar/default_avatar.svg';
                        }
                        
                        // 切换显示状态
                        loginBtn.style.display = 'none';
                        userProfile.style.display = 'inline-block';
                    } catch (e) {
                        console.error('解析用户信息失败:', e);
                        // 显示登录按钮
                        loginBtn.style.display = 'inline-block';
                        userProfile.style.display = 'none';
                    }
                } else {
                    // 未登录状态
                    loginBtn.style.display = 'inline-block';
                    userProfile.style.display = 'none';
                }
            }
            
            // 初始化检查登录状态
            checkUserLoginStatus();
            
            // 下拉菜单交互
            if (avatarContainer) {
                avatarContainer.addEventListener('click', function(e) {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('active');
                });
            }
            
            // 点击其他区域关闭下拉菜单
            document.addEventListener('click', function(event) {
                dropdownMenu.classList.remove('active');
            });
            
            // 退出登录功能
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    // 清除本地存储的用户信息
                    localStorage.removeItem('userInfo');
                    // 刷新登录状态
                    checkUserLoginStatus();
                    // 关闭下拉菜单
                    dropdownMenu.classList.remove('active');
                });
            }
            
            // 检查用户是否为管理员
            function checkAdminPermission() {
                const userInfo = localStorage.getItem('userInfo');
                if (userInfo) {
                    const user = JSON.parse(userInfo);
                    // 发送请求检查用户权限
                    fetch('/check-admin-permission', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ user_id: user.id })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (!data.isAdmin) {
                            // 非管理员重定向到首页
                            window.location.href = '/';
                        }
                    })
                    .catch(error => {
                        console.error('检查管理员权限失败:', error);
                        // 出错时也重定向到首页
                        window.location.href = '/';
                    });
                } else {
                    // 未登录用户重定向到登录页
                    window.location.href = '/login';
                }
            }
            
            // 检查管理员权限
            checkAdminPermission();
            
            // 加载用户列表
            loadUsers();
            
            // 搜索表单提交事件
            document.getElementById('search-form').addEventListener('submit', function(e) {
                e.preventDefault();
                loadUsers();
            });
            
    
            
            // 修改用户名表单提交事件
            document.getElementById('change-username-form').addEventListener('submit', function(e) {
                e.preventDefault();
                changeUsername();
            });
            
            // 修改邮箱表单提交事件
            document.getElementById('change-email-form').addEventListener('submit', function(e) {
                e.preventDefault();
                changeEmail();
            });
            
            // 修改头像表单提交事件
            document.getElementById('change-avatar-form').addEventListener('submit', function(e) {
                e.preventDefault();
                changeAvatar();
            });
            
            // 发送邮箱验证码按钮点击事件
            document.getElementById('send-email-code-btn').addEventListener('click', sendEmailVerificationCode);
            
            // 修改密码表单提交事件
            document.getElementById('change-password-form').addEventListener('submit', function(e) {
                e.preventDefault();
                changePassword();
            });
            
            // 密码强度检查
            document.getElementById('new-password').addEventListener('input', checkPasswordStrength);
            
            // 确认密码匹配检查
            document.getElementById('confirm-password').addEventListener('input', checkPasswordMatch);
            
            // 头像上传预览
            document.getElementById('avatar-upload-input').addEventListener('change', previewAvatar);
            
            // 修改手机号表单提交事件
            document.getElementById('change-phone-form').addEventListener('submit', function(e) {
                e.preventDefault();
                changePhone();
            });
        });
        
        // 打开删除用户模态框
        function openDeleteUserModal(userId, username) {
            document.getElementById('delete-user-id').value = userId;
            document.getElementById('delete-username').textContent = username;
            document.getElementById('delete-user-modal').classList.add('active');
        }
        
        // 关闭删除用户模态框
        function closeDeleteUserModal() {
            document.getElementById('delete-user-modal').classList.remove('active');
        }
        
        // 确认删除用户
        function confirmDeleteUser() {
            const userId = document.getElementById('delete-user-id').value;
            
            // 显示加载状态
            const confirmBtn = document.querySelector('#delete-user-modal .btn-danger');
            const originalText = confirmBtn.textContent;
            confirmBtn.textContent = '删除中...';
            confirmBtn.disabled = true;
            
            fetch('/api/admin-delete-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user_id: userId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeDeleteUserModal();
                    showSuccessMessage('用户删除成功');
                    loadUsers(); // 刷新用户列表
                } else {
                    showErrorMessage(data.message || '用户删除失败');
                }
            })
            .catch(error => {
                console.error('删除用户失败:', error);
                showErrorMessage('删除用户失败，请稍后重试');
            })
            .finally(() => {
                // 恢复按钮状态
                confirmBtn.textContent = originalText;
                confirmBtn.disabled = false;
            });
        }
        
        // 加载用户列表
        function loadUsers() {
            const userId = document.getElementById('search-user-id').value;
            const username = document.getElementById('search-username').value;
            const email = document.getElementById('search-email').value;
            
            // 构建查询字符串
            const params = new URLSearchParams({
                user_id: userId,
                username: username,
                email: email
            });
            
            fetch(`/api/get-all-users?${params}`)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('users-table-body');
                tableBody.innerHTML = '';
                
                if (data.success && data.users && data.users.length > 0) {
                    data.users.forEach(user => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.username}</td>
                            <td>${user.user_id}</td>
                            <td>${user.email}</td>
                            <td>${user.phone || '--'}</td>
                            <td>
                                <img src="${user.avatar || '/static/img/user_avatar/default_avatar.svg'}" alt="${user.username}" class="user-avatar-small">
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <button class="action-btn primary" onclick="openChangePasswordModal('${user.user_id}')">修改密码</button>
                                    <button class="action-btn secondary" onclick="openChangeUsernameModal('${user.user_id}', '${user.username}')">修改用户名</button>
                                    <button class="action-btn warning" onclick="openChangeEmailModal('${user.user_id}', '${user.email}')">修改邮箱</button>
                                    <button class="action-btn" onclick="openChangePhoneModal('${user.user_id}', '${user.phone || ''}')">修改手机号</button>
                                    <button class="action-btn danger" onclick="openChangeAvatarModal('${user.user_id}', '${user.avatar || '/static/img/user_avatar/default_avatar.svg'}')">修改头像</button>
                                    <button class="action-btn delete" onclick="openDeleteUserModal('${user.user_id}', '${user.username}')">删除用户</button>
                                </div>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                } else {
                    const emptyRow = document.createElement('tr');
                    emptyRow.innerHTML = `<td colspan="6" style="text-align: center; padding: 30px;">没有找到匹配的用户</td>`;
                    tableBody.appendChild(emptyRow);
                }
            })
            .catch(error => {
                console.error('加载用户列表失败:', error);
                showErrorMessage('加载用户列表失败，请稍后重试');
            });
        }
        
        // 打开修改密码模态框
        function openChangePasswordModal(userId) {
            document.getElementById('password-user-id').value = userId;
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('password-strength-bar').className = 'password-strength-bar';
            document.getElementById('password-match-error').textContent = '';
            document.getElementById('change-password-modal').classList.add('active');
        }
        
        // 关闭修改密码模态框
        function closeChangePasswordModal() {
            document.getElementById('change-password-modal').classList.remove('active');
        }
        
        // 打开修改用户名模态框
        function openChangeUsernameModal(userId, currentUsername) {
            document.getElementById('username-user-id').value = userId;
            document.getElementById('current-username').value = currentUsername;
            document.getElementById('new-username').value = '';
            document.getElementById('username-error').textContent = '';
            document.getElementById('change-username-modal').classList.add('active');
        }
        
        // 关闭修改用户名模态框
        function closeChangeUsernameModal() {
            document.getElementById('change-username-modal').classList.remove('active');
        }
        
        // 打开修改邮箱模态框
        function openChangeEmailModal(userId, currentEmail) {
            document.getElementById('email-user-id').value = userId;
            document.getElementById('current-email').value = currentEmail;
            document.getElementById('new-email').value = '';
            document.getElementById('email-verification-code').value = '';
            document.getElementById('email-error').textContent = '';
            document.getElementById('change-email-modal').classList.add('active');
        }
        
        // 关闭修改邮箱模态框
        function closeChangeEmailModal() {
            document.getElementById('change-email-modal').classList.remove('active');
        }
        
        // 打开修改头像模态框
        function openChangeAvatarModal(userId, currentAvatar) {
            document.getElementById('avatar-user-id').value = userId;
            document.getElementById('current-avatar').src = currentAvatar || '/static/img/user_avatar/default_avatar.svg';
            document.getElementById('avatar-upload-input').value = '';
            document.getElementById('avatar-preview-container').style.display = 'none';
            document.getElementById('avatar-error').textContent = '';
            document.getElementById('change-avatar-modal').classList.add('active');
        }
        
        // 关闭修改头像模态框
        function closeChangeAvatarModal() {
            document.getElementById('change-avatar-modal').classList.remove('active');
        }
        
        // 打开修改手机号模态框
        function openChangePhoneModal(userId, currentPhone) {
            document.getElementById('phone-user-id').value = userId;
            document.getElementById('current-phone').value = currentPhone || '--';
            document.getElementById('new-phone').value = '';
            document.getElementById('phone-error').textContent = '';
            document.getElementById('change-phone-modal').classList.add('active');
        }
        
        // 关闭修改手机号模态框
        function closeChangePhoneModal() {
            document.getElementById('change-phone-modal').classList.remove('active');
        }
        
        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('new-password').value;
            const strengthBar = document.getElementById('password-strength-bar');
            
            if (password.length === 0) {
                strengthBar.className = 'password-strength-bar';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Za-z]/.test(password) && /[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (strength === 1) {
                strengthBar.className = 'password-strength-bar weak';
            } else if (strength === 2) {
                strengthBar.className = 'password-strength-bar medium';
            } else if (strength >= 3) {
                strengthBar.className = 'password-strength-bar strong';
            }
        }
        
        // 检查密码匹配
        function checkPasswordMatch() {
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorElement = document.getElementById('password-match-error');
            
            if (confirmPassword.length > 0) {
                if (password !== confirmPassword) {
                    errorElement.textContent = '两次输入的密码不一致';
                } else {
                    errorElement.textContent = '';
                }
            } else {
                errorElement.textContent = '';
            }
        }
        
        // 修改密码
        function changePassword() {
            const userId = document.getElementById('password-user-id').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorElement = document.getElementById('password-match-error');
            
            // 验证密码
            if (newPassword.length < 8 || !/[A-Za-z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
                errorElement.textContent = '密码长度至少8位，必须包含字母和数字';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorElement.textContent = '两次输入的密码不一致';
                return;
            }
            
            errorElement.textContent = '';
            
            // 显示加载状态
            const submitBtn = document.querySelector('#change-password-form .btn-primary');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '修改中...';
            submitBtn.disabled = true;
            
            fetch('/api/admin-update-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user_id: userId, new_password: newPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeChangePasswordModal();
                    showSuccessMessage('密码修改成功');
                    loadUsers(); // 刷新用户列表
                } else {
                    errorElement.textContent = data.message || '密码修改失败';
                }
            })
            .catch(error => {
                console.error('修改密码失败:', error);
                errorElement.textContent = '修改密码失败，请稍后重试';
            })
            .finally(() => {
                // 恢复按钮状态
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            });
        }
        
        // 预览头像
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件类型
            if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                document.getElementById('avatar-error').textContent = '请上传JPG或PNG格式的图片';
                return;
            }
            
            // 检查文件大小
            if (file.size > 2 * 1024 * 1024) { // 2MB
                document.getElementById('avatar-error').textContent = '文件大小不能超过2MB';
                return;
            }
            
            document.getElementById('avatar-error').textContent = '';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatar-preview').src = e.target.result;
                document.getElementById('avatar-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        // 发送邮箱验证码
        function sendEmailVerificationCode() {
            // 首先获取元素本身进行调试
            const emailInput = document.getElementById('new-email');
            console.log('邮箱输入框元素:', emailInput);
            
            // 获取输入值并详细调试
            const newEmail = emailInput.value.trim();
            const errorElement = document.getElementById('email-error');
            const button = document.getElementById('send-email-code-btn');
            
            console.log('发送验证码时的原始输入值:', emailInput.value);
            console.log('发送验证码时的trim后邮箱值:', newEmail);
            console.log('邮箱值类型:', typeof newEmail);
            console.log('邮箱值长度:', newEmail.length);
            console.log('邮箱值是否为空字符串:', newEmail === '');
            console.log('邮箱值是否为null:', newEmail === null);
            console.log('邮箱值是否为undefined:', newEmail === undefined);
            
            // 改进的邮箱验证逻辑 - 添加详细的调试日志
            if (newEmail === null || newEmail === undefined || newEmail === '') {
                errorElement.textContent = '请输入邮箱地址';
                console.log('验证失败: 邮箱为空');
                return;
            }
            
            // 检查是否为有效的邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            console.log('邮箱格式验证结果:', emailRegex.test(newEmail));
            if (!emailRegex.test(newEmail)) {
                errorElement.textContent = '请输入有效的邮箱地址';
                console.log('验证失败: 邮箱格式无效:', newEmail);
                return;
            }
            
            errorElement.textContent = '';
            console.log('所有验证通过，准备发送验证码到邮箱:', newEmail);
            
            // 禁用按钮，防止重复发送
            button.disabled = true;
            let countdown = 60;
            button.textContent = `${countdown}秒后重新发送`;
            
            const timer = setInterval(() => {
                countdown--;
                button.textContent = `${countdown}秒后重新发送`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    button.disabled = false;
                    button.textContent = '发送验证码';
                }
            }, 1000);
            
            // 发送验证码请求
            fetch('/send_code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: newEmail })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    errorElement.textContent = data.message || '发送验证码失败';
                    clearInterval(timer);
                    button.disabled = false;
                    button.textContent = '发送验证码';
                }
            })
            .catch(error => {
                console.error('发送验证码失败:', error);
                errorElement.textContent = '发送验证码失败，请稍后重试';
                clearInterval(timer);
                button.disabled = false;
                button.textContent = '发送验证码';
            });
        }
        

        
        // 修改用户名
        function changeUsername() {
            const userId = document.getElementById('username-user-id').value;
            const newUsername = document.getElementById('new-username').value;
            const errorElement = document.getElementById('username-error');
            
            // 验证用户名
            if (!newUsername.trim()) {
                errorElement.textContent = '用户名不能为空';
                return;
            }
            
            if (newUsername.length > 20) {
                errorElement.textContent = '用户名长度不能超过20个字符';
                return;
            }
            
            errorElement.textContent = '';
            
            fetch('/api/admin-update-username', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user_id: userId, new_username: newUsername })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeChangeUsernameModal();
                    showSuccessMessage('用户名修改成功');
                    loadUsers(); // 刷新用户列表
                } else {
                    errorElement.textContent = data.message || '用户名修改失败';

            })
            .catch(error => {
                console.error('修改用户名失败:', error);
                errorElement.textContent = '修改用户名失败，请稍后重试';
            });
        }
        
        // 为修改邮箱表单添加提交事件监听器，阻止默认提交
        document.getElementById('change-email-form').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单默认提交
            changeEmail(); // 调用我们的验证和提交函数
        });
        
        // 修改邮箱
        function changeEmail() {

            // 获取邮箱输入元素并详细调试
            const emailInput = document.getElementById('new-email');

            const newEmail = emailInput.value.trim();

            console.log('changeEmail函数中邮箱值类型:', typeof newEmail);
            console.log('changeEmail函数中邮箱值长度:', newEmail.length);
            console.log('changeEmail函数中邮箱值是否为空字符串:', newEmail === '');
            
            // 改进的邮箱验证逻辑
            if (newEmail === null || newEmail === undefined || newEmail === '') {

                return;
            }
            
            // 检查是否为有效的邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            console.log('changeEmail函数中邮箱格式验证结果:', emailRegex.test(newEmail));
            if (!emailRegex.test(newEmail)) {
                errorElement.textContent = '请输入有效的邮箱地址';

        // 修改头像
        function changeAvatar() {
            const userId = document.getElementById('avatar-user-id').value;
            const fileInput = document.getElementById('avatar-upload-input');
            const errorElement = document.getElementById('avatar-error');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                errorElement.textContent = '请选择要上传的头像';
                return;
            }
            
            const file = fileInput.files[0];
            
            // 检查文件类型和大小
            if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                errorElement.textContent = '请上传JPG或PNG格式的图片';
                return;
            }
            
            if (file.size > 2 * 1024 * 1024) { // 2MB
                errorElement.textContent = '文件大小不能超过2MB';
                return;
            }
            
            errorElement.textContent = '';
            
            const formData = new FormData();
            formData.append('user_id', userId);
            formData.append('avatar', file);
            
            fetch('/api/admin-update-avatar', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeChangeAvatarModal();
                    showSuccessMessage('头像修改成功');
                    loadUsers(); // 刷新用户列表
                } else {
                    errorElement.textContent = data.message || '头像修改失败';
                }
            })
            .catch(error => {
                console.error('修改头像失败:', error);
                errorElement.textContent = '修改头像失败，请稍后重试';
            });
        }
        
        // 修改手机号
        function changePhone() {
            const userId = document.getElementById('phone-user-id').value;
            const newPhone = document.getElementById('new-phone').value.trim();
            const errorElement = document.getElementById('phone-error');
            
            // 简单的手机号验证（中国手机号格式）
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!newPhone) {
                errorElement.textContent = '请输入手机号';
                return;
            }
            if (!phoneRegex.test(newPhone)) {
                errorElement.textContent = '请输入有效的手机号';
                return;
            }
            
            errorElement.textContent = '';
            
            fetch('/api/admin-update-phone', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user_id: userId, new_phone: newPhone })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    closeChangePhoneModal();
                    showSuccessMessage('手机号修改成功');
                    loadUsers(); // 刷新用户列表
                } else {
                    errorElement.textContent = data.message || '手机号修改失败';
                }
            })
            .catch(error => {
                console.error('修改手机号失败:', error);
                errorElement.textContent = '修改手机号失败，请稍后重试';
            });
        }
        
        // 显示成功消息
        function showSuccessMessage(message) {
            const successMessage = document.getElementById('success-message');
            successMessage.textContent = message;
            successMessage.classList.add('active');
            
            setTimeout(() => {
                successMessage.classList.remove('active');
            }, 3000);
        }
        
        // 显示错误消息
        function showErrorMessage(message) {
            const errorMessage = document.getElementById('error-message-display');
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
            
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 3000);
        }
