<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全验证 - 少年友晴天-统一账户认证系统</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <link rel="preconnect" href="https://challenges.cloudflare.com" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e2e8f0;
        }
        .cf-fullscreen-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .cf-brand {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }
        .cf-brand .logo-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8784A, #9BA4DC);
            margin-right: 8px;
            vertical-align: middle;
        }
        .cf-status {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
            min-height: 20px;
        }
        .cf-status.error { color: #f87171; }
        .cf-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #334155;
            border-top-color: #E8784A;
            border-radius: 50%;
            animation: cf-spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes cf-spin { to { transform: rotate(360deg); } }
        /* 让 Turnstile widget 居中且显眼 */
        #turnstile-widget {
            transform: scale(1.15);
            transform-origin: center;
        }
        .cf-footer {
            position: absolute;
            bottom: 16px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="cf-fullscreen-wrapper">
        <div class="cf-brand"><span class="logo-dot"></span>少年友晴天 · 安全验证</div>
        <div class="cf-status" id="status">
            <span class="cf-spinner"></span>正在准备验证环境...
        </div>
        <div id="turnstile-widget"
             class="cf-turnstile"
             data-sitekey="{{ turnstile_sitekey }}"
             data-callback="onTurnstileSuccess"
             data-expired-callback="onTurnstileExpired"
             data-error-callback="onTurnstileError"
             data-theme="dark"
             data-size="normal"
             data-execution="render"
             data-language="zh-CN">
        </div>
        <div class="cf-footer">由 Cloudflare Turnstile 提供人机验证保护</div>
    </div>

    <script>
        const nextUrl = {{ next_url | tojson }};

        function setStatus(text, isError) {
            const el = document.getElementById('status');
            el.classList.toggle('error', !!isError);
            el.innerHTML = isError ? text : '<span class="cf-spinner"></span>' + text;
        }

        function onTurnstileLoad() {
            setStatus('请完成人机验证（通常无需操作）');
        }

        function onTurnstileSuccess(token) {
            // 立即提交，不显示跳转动画
            setStatus('验证通过，正在跳转...');
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/api/turnstile/verify-form';
            const f1 = document.createElement('input');
            f1.name = 'cf-turnstile-response';
            f1.value = token;
            const f2 = document.createElement('input');
            f2.name = 'next';
            f2.value = nextUrl || '/';
            form.appendChild(f1);
            form.appendChild(f2);
            document.body.appendChild(form);
            form.submit();
        }

        function onTurnstileExpired() {
            setStatus('验证已过期，正在重试...', true);
            if (typeof turnstile !== 'undefined') turnstile.reset();
        }

        function onTurnstileError() {
            setStatus('验证加载失败，请刷新页面重试', true);
        }
    </script>
</body>
</html>
