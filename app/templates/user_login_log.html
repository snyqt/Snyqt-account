<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人登录日志 - 少年友晴天-统一账户认证系统</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/icon/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme-toggle.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-middle1) 50%, var(--bg-gradient-middle2) 50%, var(--danger-color) 100%);
            opacity: var(--bg-gradient-opacity);
            z-index: -1;
        }

        .header {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 15px 40px;
            box-shadow: 0 2px 10px var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .header:hover {
            box-shadow: 0 3px 15px var(--card-shadow);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 80px;
            width: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }

        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: #333333;
        }

        .header-right {
            display: flex;
            align-items: center;
        }

        .user-profile {
            position: relative;
            cursor: pointer;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            object-fit: cover;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--primary-shadow);
            min-width: 200px;
            margin-top: 10px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 15px 20px;
            font-size: 15px;
            color: var(--text-color);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: left;
        }

        .dropdown-item:hover {
            background-color: var(--primary-shadow);
            color: var(--danger-color);
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 5px 0;
        }

        .logout-btn {
            color: var(--secondary-text) !important;
            width: calc(100% - 10px);
            text-align: left;
            border: none;
            background: none;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
        }

        .logout-btn:hover {
            color: var(--danger-color);
            background-color: rgba(255, 158, 125, 0.1);
        }

        .container {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 10px;
            width: 100%;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--card-shadow);
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .content-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--primary-shadow);
            background: var(--card-bg);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--bg-gradient-start);
            padding-left: 15px;
        }

        .logs-table-container {
            overflow-x: auto;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .logs-table th,
        .logs-table td {
            padding: 15px 12px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        .logs-table th {
            background-color: var(--primary-shadow);
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
        }

        .logs-table td {
            font-size: 14px;
            color: var(--tag-text);
        }

        .logs-table tbody tr:hover {
            background-color: rgba(184, 196, 255, 0.05);
        }

        .danger-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .danger-badge.danger {
            background-color: rgba(255, 158, 125, 0.2);
            color: var(--danger-color);
        }

        .danger-badge.normal {
            background-color: rgba(184, 196, 255, 0.2);
            color: var(--bg-gradient-middle1);
        }

        .loading-message {
            text-align: center;
            color: #666666;
            padding: 40px 20px;
            font-size: 16px;
        }

        .no-logs {
            text-align: center;
            color: #666666;
            padding: 60px 20px;
            font-size: 16px;
        }

        .no-logs i {
            font-size: 48px;
            color: var(--bg-gradient-start);
            margin-bottom: 15px;
            display: block;
        }

        .footer {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: var(--secondary-text);
            text-align: center;
            padding: 20px;
            margin-top: auto;
            font-size: 14px;
            box-shadow: 0 -2px 10px var(--primary-shadow);
            border-top: 1px solid var(--card-border);
        }

        .footer p {
            margin: 0;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-title {
                font-size: 20px;
            }

            .user-avatar {
                width: 60px;
                height: 60px;
            }

            .container {
                padding: 0 15px;
                margin: 20px auto;
            }

            .content-card {
                padding: 20px;
            }

            .card-title {
                font-size: 20px;
            }

            .logs-table th,
            .logs-table td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo-link">
                <img src="/static/img/logo.png" alt="少年友晴天-统一账户认证系统" class="logo">
            </a>
            <h1 class="header-title">少年友晴天-统一账户认证系统</h1>
        </div>
        <div class="header-right">
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
            <div class="user-profile" id="user-profile">
                <div class="avatar-container" id="avatar-container">
                    <img src="" alt="用户头像" class="user-avatar" id="user-avatar">
                </div>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item profile-item">个人信息</div>
                    <div class="dropdown-item permission-item" id="permission-item">权限管理</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item logout-btn" id="logout-btn">退出登录</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="content-card">
            <h2 class="card-title">我的登录日志</h2>
            <div id="logs-container" class="logs-table-container">
                <div class="loading-message">加载中...</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 少年友晴天-统一账户认证系统 | 以科技化的方式，无限进步！</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function getUserInfo() {
                fetch('/get_user_info')
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            const user = data.user;
                            document.getElementById('user-avatar').src = user.avatar || '/static/img/default_avatar.png';
                        } else {
                            window.location.href = '/login';
                        }
                    });
            }

            getUserInfo();

            const avatarContainer = document.getElementById('avatar-container');
            const dropdownMenu = document.getElementById('dropdown-menu');

            avatarContainer.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdownMenu.classList.toggle('active');
            });

            document.addEventListener('click', function() {
                dropdownMenu.classList.remove('active');
            });

            document.querySelector('.profile-item').addEventListener('click', function() {
                window.location.href = '/profile';
                dropdownMenu.classList.remove('active');
            });

            document.querySelector('.permission-item').addEventListener('click', function() {
                window.location.href = '/permission';
                dropdownMenu.classList.remove('active');
            });

            document.getElementById('logout-btn').addEventListener('click', function() {
                fetch('/logout')
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            localStorage.removeItem('userInfo');
                            window.location.href = '/';
                        }
                    });
            });

            function loadLoginLogs() {
                const logsContainer = document.getElementById('logs-container');
                logsContainer.innerHTML = '<div class="loading-message">加载中...</div>';

                fetch('/api/user-login-logs')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('网络响应错误');
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.success && data.logs && data.logs.length > 0) {
                            renderLogs(data.logs);
                        } else {
                            logsContainer.innerHTML = `
                                <div class="no-logs">
                                    <i class="fas fa-history"></i>
                                    <p>暂无登录日志记录</p>
                                </div>
                            `;
                        }
                    })
                    .catch(error => {
                        console.error('获取登录日志失败:', error);
                        logsContainer.innerHTML = `
                            <div class="no-logs">
                                <i class="fas fa-exclamation-circle"></i>
                                <p>获取登录日志失败，请刷新页面重试</p>
                            </div>
                        `;
                    });
            }

            function renderLogs(logs) {
                const logsContainer = document.getElementById('logs-container');
                let tableHTML = `
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>登录时间</th>
                                <th>IP地址</th>
                                <th>地理位置</th>
                                <th>浏览器</th>
                                <th>登录状态</th>
                                <th>风险状态</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                logs.forEach(log => {
                    const isDanger = log.is_danger === 1;
                    const loginStatus = log.is_cookie === 1 ? '长期保持' : '临时登录';
                    const dangerClass = isDanger ? 'danger' : 'normal';
                    const dangerText = isDanger ? '风险登录' : '正常登录';

                    tableHTML += `
                        <tr>
                            <td>${log.time || '--'}</td>
                            <td>${log.ip || '--'}</td>
                            <td>${log.place || '--'}</td>
                            <td>${log.browser || '--'}</td>
                            <td>${loginStatus}</td>
                            <td>
                                <span class="danger-badge ${dangerClass}">
                                    ${dangerText}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                logsContainer.innerHTML = tableHTML;
            }

            loadLoginLogs();
        });
    </script>
    <script src="/static/js/theme-toggle.js"></script>
</body>
</html>
