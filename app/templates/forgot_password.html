<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 少年友晴天-统一账户认证系统</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="/static/css/icon/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme-toggle.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <!-- 立即加载主题切换脚本，防止白闪 -->
    <script src="/static/js/theme-toggle.js"></script>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 全局样式 */
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 黄昏海边背景渐变 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-middle1) 50%, var(--bg-gradient-middle2) 50%, var(--bg-gradient-end) 100%);
            opacity: var(--bg-gradient-opacity);
            z-index: -1;
        }
        
        /* 头部样式 */
        .header {
            background: var(--card-bg);
            color: var(--text-color);
            padding: 15px 20px;
            box-shadow: 0 2px 10px var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .header:hover {
            box-shadow: 0 3px 15px var(--card-shadow);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            height: 80px;
            width: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
        }
        
        /* Logo链接样式 */
        .logo-link {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }
        
        /* 主容器 */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        /* 表单卡片 */
        .auth-container {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--card-shadow);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .auth-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--primary-shadow);
        }
        
        /* 表单标题 */
        .auth-header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            text-align: center;
        }
        
        .auth-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-color);
            margin: 0;
        }
        
        /* 步骤指示器 */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: var(--card-bg);
        }
        
        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }
        
        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--card-border);
            color: var(--secondary-text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .step.active .step-number {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
            color: white;
        }
        
        .step.completed .step-number {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
            color: white;
        }
        
        .step-title {
            font-size: 14px;
            color: var(--secondary-text);
        }
        
        .step.active .step-title {
            color: var(--text-color);
            font-weight: 600;
        }
        
        /* 表单区域 */
        .auth-content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 16px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--input-text);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--bg-gradient-start);
            background: var(--input-bg);
            box-shadow: 0 0 0 3px var(--primary-shadow);
        }
        
        .form-input.error {
            border-color: var(--danger-color);
        }
        
        .form-input.success {
            border-color: var(--bg-gradient-start);
        }
        
        .validation-icon {
            position: absolute;
            right: 20px;
            top: 65%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: var(--bg-gradient-start);
        }
        
        /* 验证码验证图标特定样式 */
        .code-validation-icon {
            position: absolute;
            right: 20px;
            top: 55%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: var(--bg-gradient-start);
        }
        
        .code-validation-icon.valid {
            opacity: 1;
            color: var(--bg-gradient-start);
        }
        
        .validation-icon.valid {
            opacity: 1;
            color: var(--bg-gradient-start);
        }
        
        /* 密码强度条 */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--card-border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
            background: linear-gradient(90deg, var(--bg-gradient-start) 0%, var(--danger-color) 100%);
        }
        
        /* 密码提示 */
        .password-hint {
            margin-top: 5px;
            font-size: 14px;
            color: var(--secondary-text);
        }
        
        .password-hint.error {
            color: var(--danger-color);
        }
        
        /* 验证码区域 */
        .verification-code {
            display: flex;
            gap: 15px;
        }
        
        .verification-code .form-input {
            flex: 1;
        }
        
        .send-code-btn {
            padding: 15px 25px;
            background: var(--primary-bg);
            color: var(--text-color);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .send-code-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-shadow);
            background: var(--primary-bg-hover);
        }
        
        .send-code-btn:disabled {
            background: var(--card-border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border-color: var(--card-border);
        }
        
        /* 按钮区域 */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 18px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--danger-bg-hover);
            color: white;
            border-color: var(--bg-gradient-middle2);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--danger-shadow);
            background: var(--danger-bg);
        }
        
        .btn-primary:disabled {
            background: var(--card-border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border-color: var(--card-border);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border-color: var(--bg-gradient-start);
        }
        
        .btn-secondary:hover {
            background: var(--primary-shadow);
            box-shadow: 0 4px 12px var(--primary-shadow);
        }
        
        /* 确认信息区域 */
        .confirm-info {
            background: rgba(184, 196, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(184, 196, 255, 0.2);
        }
        
        .confirm-item {
            display: flex;
            margin-bottom: 10px;
        }
        
        .confirm-label {
            font-weight: 600;
            color: var(--secondary-text);
            width: 100px;
        }
        
        .confirm-value {
            color: var(--text-color);
        }
        
        /* 错误信息 */
        .error-message {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 成功信息 */
        .success-message {
            color: var(--bg-gradient-start);
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* 返回登录链接 */
        .login-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .login-link a {
            color: var(--danger-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        /* 页脚 */
        .footer {
            background: var(--card-bg);
            color: var(--secondary-text);
            padding: 20px;
            text-align: center;
            margin-top: auto;
            border-top: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        
        .footer p {
            margin: 0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .auth-content {
                padding: 30px 20px;
            }
            
            .header-title {
                font-size: 20px;
            }
            
            .logo {
                height: 60px;
                width: 60px;
            }
            
            .verification-code {
                flex-direction: column;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .step-title {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo-link">
                <img src="/static/img/logo.png" alt="少年友晴天-统一账户认证系统" class="logo">
            </a>
            <h1 class="header-title">少年友晴天-统一账户认证系统</h1>
        </div>
        <div class="header-right">
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </header>
    
    <div class="container">
        <div class="auth-container">
            <!-- 标题 -->
            <div class="auth-header">
                <h2 class="auth-title">找回密码</h2>
            </div>
            
            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step active" id="step-1">
                    <div class="step-number">1</div>
                    <div class="step-title">身份验证</div>
                </div>
                <div class="step" id="step-2">
                    <div class="step-number">2</div>
                    <div class="step-title">重置密码</div>
                </div>
            </div>
            
            <!-- 第一步：身份验证表单 -->
            <div id="step-1-form" class="auth-content">
                <form id="verify-form">
                    <!-- 用户名 -->
                    <div class="form-group">
                        <label for="username">用户名 *</label>
                        <input type="text" id="username" class="form-input" placeholder="请输入用户名">
                        <span class="error-message" id="username-error"></span>
                    </div>
                    
                    <!-- 邮箱 -->
                    <div class="form-group">
                        <label for="email">邮箱 *</label>
                        <input type="email" id="email" class="form-input" placeholder="请输入邮箱地址">
                        <span class="validation-icon" id="email-valid-icon"><i class="fas fa-check"></i></span>
                        <span class="error-message" id="email-error"></span>
                    </div>
                    
                    <!-- 手机号 -->
                    <div class="form-group">
                        <label for="phone">手机号 *</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="phone-area-code" class="form-input" style="width: 120px;">
                                <option value="+86">+86 中国</option>
                                <option value="+852">+852 香港</option>
                                <option value="+853">+853 澳门</option>
                                <option value="+886">+886 台湾</option>
                                <option value="+1">+1 美国/加拿大</option>
                                <option value="+44">+44 英国</option>
                                <option value="+81">+81 日本</option>
                                <option value="+82">+82 韩国</option>
                                <option value="+65">+65 新加坡</option>
                                <option value="+60">+60 马来西亚</option>
                                <option value="+66">+66 泰国</option>
                                <option value="+61">+61 澳大利亚</option>
                                <option value="+64">+64 新西兰</option>
                            </select>
                            <input type="text" id="phone" class="form-input" style="flex: 1;" placeholder="请输入手机号码">
                        </div>
                        <span class="error-message" id="phone-error"></span>
                    </div>
                    
                    <!-- 验证码 -->
                    <div class="form-group">
                        <label for="verification_code">验证码 *</label>
                        <div style="position: relative; display: inline-block; width: calc(100% - 180px);">
                            <input type="text" id="verification_code" class="form-input" placeholder="请输入验证码">
                            <span class="code-validation-icon" id="code-valid-icon"><i class="fas fa-check"></i></span>
                        </div>
                        <button type="button" class="send-code-btn" id="send-code-btn" style="width: 160px; display: inline-block; margin-left: 15px;" disabled>发送验证码</button>
                        <span class="error-message" id="verification-error"></span>
                    </div>
                    
                    <!-- 手机验证码 -->
                    <div class="form-group">
                        <label for="sms_verification_code">手机验证码 *</label>
                        <div style="position: relative; display: inline-block; width: calc(100% - 180px);">
                            <input type="text" id="sms_verification_code" class="form-input" placeholder="请输入手机验证码">
                            <span class="code-validation-icon" id="sms-code-valid-icon"><i class="fas fa-check"></i></span>
                        </div>
                        <button type="button" class="send-code-btn" id="send-sms-code-btn" style="width: 160px; display: inline-block; margin-left: 15px;" disabled>发送手机验证码</button>
                        <span class="error-message" id="sms-verification-error"></span>
                    </div>
                    
                    <!-- 按钮 -->
                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" id="back-btn">返回</button>
                        <button type="button" class="btn btn-primary" id="next-btn" disabled>下一步</button>
                    </div>
                </form>
            </div>
            
            <!-- 第二步：重置密码表单 -->
            <div id="step-2-form" class="auth-content" style="display: none;">
                <!-- 确认信息 -->
                <div class="confirm-info">
                    <div class="confirm-item">
                        <span class="confirm-label">用户名：</span>
                        <span class="confirm-value" id="confirm-username"></span>
                    </div>
                    <div class="confirm-item">
                        <span class="confirm-label">邮箱：</span>
                        <span class="confirm-value" id="confirm-email"></span>
                    </div>
                    <div class="confirm-item">
                        <span class="confirm-label">手机号：</span>
                        <span class="confirm-value" id="confirm-phone"></span>
                    </div>
                </div>
                
                <form id="reset-form">
                    <!-- 新密码 -->
                    <div class="form-group">
                        <label for="new-password">新密码 *</label>
                        <input type="password" id="new-password" class="form-input" placeholder="请输入新密码">
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strength-bar"></div>
                        </div>
                        <div class="password-hint" id="password-hint">密码要求：长度超过6位，包含数字、大小写字母及特殊符号</div>
                        <span class="error-message" id="new-password-error"></span>
                    </div>
                    
                    <!-- 确认新密码 -->
                    <div class="form-group">
                        <label for="confirm-new-password">确认新密码 *</label>
                        <input type="password" id="confirm-new-password" class="form-input" placeholder="请再次输入新密码">
                        <span class="validation-icon" id="password-match-icon"><i class="fas fa-check"></i></span>
                        <span class="error-message" id="confirm-new-password-error"></span>
                    </div>
                    
                    <!-- 按钮 -->
                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" id="back-to-step-1">上一步</button>
                        <button type="submit" class="btn btn-primary" id="reset-btn" disabled>确认重置</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2025 少年友晴天-统一账户认证系统 | 以科技化的方式，无限进步！</p>
    </footer>
    
    <script>
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            // 全局变量
            let currentEmail = '';
            let currentPhone = '';
            let countdown = 60;
            let smsCountdown = 60;
            let timer = null;
            let smsTimer = null;
            let userInfo = {}; // 保存验证通过的用户信息
            let hasSentCode = false; // 标记是否已经发送过验证码
            let hasSentSmsCode = false; // 标记是否已经发送过手机验证码
            
            // 表单元素
            const verifyForm = document.getElementById('verify-form');
            const resetForm = document.getElementById('reset-form');
            
            // 第一步元素
            const step1Form = document.getElementById('step-1-form');
            const step2Form = document.getElementById('step-2-form');
            const step1Indicator = document.getElementById('step-1');
            const step2Indicator = document.getElementById('step-2');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const phoneInput = document.getElementById('phone');
            const verificationInput = document.getElementById('verification_code');
            const smsVerificationInput = document.getElementById('sms_verification_code');
            const sendCodeBtn = document.getElementById('send-code-btn');
            const sendSmsCodeBtn = document.getElementById('send-sms-code-btn');
            const nextBtn = document.getElementById('next-btn');
            const backBtn = document.getElementById('back-btn');
            
            // 第二步元素
            const newPasswordInput = document.getElementById('new-password');
            const confirmNewPasswordInput = document.getElementById('confirm-new-password');
            const resetBtn = document.getElementById('reset-btn');
            const backToStep1Btn = document.getElementById('back-to-step-1');
            const confirmUsername = document.getElementById('confirm-username');
            const confirmEmail = document.getElementById('confirm-email');
            const confirmPhone = document.getElementById('confirm-phone');
            
            // 验证图标和错误信息元素
            const emailValidIcon = document.getElementById('email-valid-icon');
            const codeValidIcon = document.getElementById('code-valid-icon');
            const smsCodeValidIcon = document.getElementById('sms-code-valid-icon');
            const passwordMatchIcon = document.getElementById('password-match-icon');
            const strengthBar = document.getElementById('strength-bar');
            const passwordHint = document.getElementById('password-hint');
            
            const usernameError = document.getElementById('username-error');
            const emailError = document.getElementById('email-error');
            const phoneError = document.getElementById('phone-error');
            const verificationError = document.getElementById('verification-error');
            const smsVerificationError = document.getElementById('sms-verification-error');
            const newPasswordError = document.getElementById('new-password-error');
            const confirmNewPasswordError = document.getElementById('confirm-new-password-error');
            
            // 邮箱验证
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
            
            // 手机号验证 - 支持带区号的手机号，如 +86-13812345678 或 13812345678
            function validatePhone(phone) {
                // 提取纯数字
                const purePhone = phone.replace(/[^\d]/g, '');
                const re = /^1[3-9]\d{9}$/;
                return re.test(purePhone);
            }

            // 提取纯手机号（去除区号等格式）
            function extractPurePhone(phone) {
                return phone.replace(/[^\d]/g, '');
            }
            
            // 检查密码强度 - 与后端 is_password_strong 函数保持一致
            function checkPasswordStrength(password) {
                // 直接使用与后端相同的逻辑检查密码
                let isValid = true;
                
                if (password.length <= 6) {
                    isValid = false;
                }
                if (!/\d/.test(password)) {
                    isValid = false;
                }
                if (!/[A-Z]/.test(password)) {
                    isValid = false;
                }
                if (!/[a-z]/.test(password)) {
                    isValid = false;
                }
                if (!/[^A-Za-z0-9]/.test(password)) {
                    isValid = false;
                }
                
                // 计算强度值用于显示进度条
                let strength = 0;
                if (password.length > 6) strength += 20;
                if (/\d/.test(password)) strength += 20;
                if (/[A-Z]/.test(password)) strength += 20;
                if (/[a-z]/.test(password)) strength += 20;
                if (/[^A-Za-z0-9]/.test(password)) strength += 20;
                
                // 更新强度条
                strengthBar.style.width = strength + '%';
                
                // 更新颜色和提示
                if (strength < 60) {
                    strengthBar.style.backgroundColor = '#dc3545';
                    passwordHint.classList.add('error');
                } else if (strength < 100) {
                    strengthBar.style.backgroundColor = '#ffc107';
                    passwordHint.classList.add('error');
                } else {
                    strengthBar.style.backgroundColor = '#28a745';
                    passwordHint.classList.remove('error');
                }
                
                return isValid;
            }
            
            // 检查密码是否匹配
            function checkPasswordMatch() {
                const newPassword = newPasswordInput.value;
                const confirmNewPassword = confirmNewPasswordInput.value;
                
                if (confirmNewPassword === '') {
                    passwordMatchIcon.classList.remove('valid');
                    confirmNewPasswordError.textContent = '';
                    updateResetButton();
                    return;
                }
                
                if (newPassword === confirmNewPassword && newPassword.length > 6) {
                    passwordMatchIcon.classList.add('valid');
                    confirmNewPasswordError.textContent = '';
                    confirmNewPasswordInput.classList.remove('error');
                    confirmNewPasswordInput.classList.add('success');
                } else {
                    passwordMatchIcon.classList.remove('valid');
                    confirmNewPasswordError.textContent = '两次输入的密码不一致';
                    confirmNewPasswordInput.classList.add('error');
                    confirmNewPasswordInput.classList.remove('success');
                }
                
                updateResetButton();
            }
            
            // 更新下一步按钮状态
            function updateNextButton() {
                const isUsernameValid = usernameInput.value.trim().length >= 2;
                const isEmailValid = validateEmail(emailInput.value);
                const isPhoneValid = validatePhone(phoneInput.value);
                const isCodeValid = codeValidIcon.classList.contains('valid');
                const isSmsCodeValid = smsCodeValidIcon.classList.contains('valid');
                
                nextBtn.disabled = !(isUsernameValid && isEmailValid && isPhoneValid && isCodeValid && isSmsCodeValid);
            }
            
            // 更新重置按钮状态
            function updateResetButton() {
                const isPasswordValid = checkPasswordStrength(newPasswordInput.value);
                const isPasswordMatched = newPasswordInput.value === confirmNewPasswordInput.value && 
                                          confirmNewPasswordInput.value.length > 0;
                
                resetBtn.disabled = !(isPasswordValid && isPasswordMatched);
            }
            
            // 安全添加事件监听器
            if (sendCodeBtn) {
                // 发送验证码
                sendCodeBtn.addEventListener('click', function() {
                    const email = emailInput.value;
                    const username = usernameInput.value.trim();
                    
                    if (!validateEmail(email)) {
                        return;
                    }
                    
                    // 验证用户名和邮箱是否匹配
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('email', email);
                    
                    fetch('/verify_user', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // 保存用户信息
                            userInfo = data.userInfo;
                            
                            // 禁用按钮并开始倒计时
                            sendCodeBtn.disabled = true;
                            sendCodeBtn.textContent = `${countdown}秒后重新发送`;
                            
                            // 发送验证码请求
                            const codeFormData = new FormData();
                            codeFormData.append('email', email);
                            codeFormData.append('purpose', 'forgot');

                            fetch('/send_code', {
                                method: 'POST',
                                body: codeFormData
                            })
                            .then(response => response.json())
                            .then(data => {
                                if (data.success) {
                                    alert('验证码已发送到您的邮箱，请查收');
                                    hasSentCode = true; // 标记已发送验证码
                                } else {
                                    alert('发送失败：' + data.message);
                                    // 恢复按钮
                                    clearInterval(timer);
                                    sendCodeBtn.disabled = false;
                                    sendCodeBtn.textContent = '发送验证码';
                                    countdown = 60;
                                }
                            })
                            .catch(error => {
                                console.error('错误:', error);
                                alert('发送失败，请稍后重试');
                                // 恢复按钮
                                clearInterval(timer);
                                sendCodeBtn.disabled = false;
                                sendCodeBtn.textContent = '发送验证码';
                                countdown = 60;
                            });
                            
                            // 倒计时
                            timer = setInterval(() => {
                                countdown--;
                                sendCodeBtn.textContent = `${countdown}秒后重新发送`;
                                
                                if (countdown <= 0) {
                                    clearInterval(timer);
                                    sendCodeBtn.disabled = false;
                                    sendCodeBtn.textContent = '发送验证码';
                                    countdown = 60;
                                }
                            }, 1000);
                        } else {
                            alert('错误：' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('错误:', error);
                        alert('验证失败，请稍后重试');
                    });
                });
            }
            
            if (sendSmsCodeBtn) {
                // 发送手机验证码
                sendSmsCodeBtn.addEventListener('click', function() {
                    const phone = phoneInput.value;
                    const username = usernameInput.value.trim();
                    
                    if (!validatePhone(phone)) {
                        return;
                    }
                    
                    // 验证用户名、邮箱和手机号是否匹配
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('email', emailInput.value);
                    
                    fetch('/verify_user', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // 保存用户信息
                            userInfo = data.userInfo;
                            
                            // 验证手机号是否匹配
                            const areaCode = document.getElementById('phone-area-code').value;
                            const userInputPhone = extractPurePhone(phone);
                            const dbPhone = data.userInfo.phone;
                            console.log('用户输入手机号:', userInputPhone, '数据库手机号:', dbPhone);
                            if (dbPhone && userInputPhone !== dbPhone) {
                                alert('手机号与用户信息不匹配，请检查输入');
                                return;
                            }
                            
                            // 禁用按钮并开始倒计时
                            sendSmsCodeBtn.disabled = true;
                            sendSmsCodeBtn.textContent = `${smsCountdown}秒后重新发送`;
                            
                            // 发送短信验证码请求
                            const smsPhone = areaCode + '-' + phone;
                            console.log('发送短信手机号:', smsPhone);
                            fetch('/api/send-sms-code', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ phone: smsPhone })
                            })
                            .then(response => response.json())
                            .then(data => {
                                if (data.success) {
                                    alert('验证码已发送到您的手机，请查收');
                                    hasSentSmsCode = true; // 标记已发送验证码
                                } else {
                                    alert('发送失败：' + data.message);
                                    // 恢复按钮
                                    clearInterval(smsTimer);
                                    sendSmsCodeBtn.disabled = false;
                                    sendSmsCodeBtn.textContent = '发送手机验证码';
                                    smsCountdown = 60;
                                }
                            })
                            .catch(error => {
                                console.error('错误:', error);
                                alert('发送失败，请稍后重试');
                                // 恢复按钮
                                clearInterval(smsTimer);
                                sendSmsCodeBtn.disabled = false;
                                sendSmsCodeBtn.textContent = '发送手机验证码';
                                smsCountdown = 60;
                            });
                            
                            // 倒计时
                            smsTimer = setInterval(() => {
                                smsCountdown--;
                                sendSmsCodeBtn.textContent = `${smsCountdown}秒后重新发送`;
                                
                                if (smsCountdown <= 0) {
                                    clearInterval(smsTimer);
                                    sendSmsCodeBtn.disabled = false;
                                    sendSmsCodeBtn.textContent = '发送手机验证码';
                                    smsCountdown = 60;
                                }
                            }, 1000);
                        } else {
                            alert('错误：' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('错误:', error);
                        alert('验证失败，请稍后重试');
                    });
                });
            }
            
            if (verificationInput) {
                // 验证码验证
                verificationInput.addEventListener('input', function() {
                    const code = this.value;
                    
                    // 验证码长度为6位数字
                    if (code.length === 6 && /^\d+$/.test(code)) {
                        // 验证验证码
                        const formData = new FormData();
                        formData.append('email', emailInput.value);
                        formData.append('code', code);
                        
                        fetch('/verify_code', {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.valid) {
                                codeValidIcon.classList.add('valid');
                                verificationError.textContent = '';
                                verificationInput.classList.remove('error');
                                verificationInput.classList.add('success');
                            } else {
                                codeValidIcon.classList.remove('valid');
                                verificationError.textContent = '验证码不正确';
                                verificationInput.classList.add('error');
                                verificationInput.classList.remove('success');
                            }
                            updateNextButton();
                        });
                    } else {
                        codeValidIcon.classList.remove('valid');
                        verificationError.textContent = '';
                        verificationInput.classList.remove('error');
                        verificationInput.classList.remove('success');
                        updateNextButton();
                    }
                });
            }
            
            if (smsVerificationInput) {
                // 手机验证码验证
                smsVerificationInput.addEventListener('input', function() {
                    const code = this.value;
                    
                    // 验证码长度为6位数字
                    if (code.length === 6 && /^\d+$/.test(code)) {
                        // 验证验证码
                        const smsPhone = document.getElementById('phone-area-code').value + '-' + phoneInput.value;
                        fetch('/api/verify-sms-code', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ phone: smsPhone, code: code })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                smsCodeValidIcon.classList.add('valid');
                                smsVerificationError.textContent = '';
                                smsVerificationInput.classList.remove('error');
                                smsVerificationInput.classList.add('success');
                            } else {
                                smsCodeValidIcon.classList.remove('valid');
                                smsVerificationError.textContent = data.message || '验证码不正确';
                                smsVerificationInput.classList.add('error');
                                smsVerificationInput.classList.remove('success');
                            }
                            updateNextButton();
                        });
                    } else {
                        smsCodeValidIcon.classList.remove('valid');
                        smsVerificationError.textContent = '';
                        smsVerificationInput.classList.remove('error');
                        smsVerificationInput.classList.remove('success');
                        updateNextButton();
                    }
                });
            }
            
            if (emailInput) {
                // 邮箱输入验证
                emailInput.addEventListener('input', function() {
                    const email = this.value;
                    
                    if (validateEmail(email)) {
                        emailValidIcon.classList.add('valid');
                        emailError.textContent = '';
                        emailInput.classList.remove('error');
                        emailInput.classList.add('success');
                        sendCodeBtn.disabled = false;
                    } else {
                        emailValidIcon.classList.remove('valid');
                        if (email !== '') {
                            emailError.textContent = '请输入有效的邮箱地址';
                            emailInput.classList.add('error');
                        } else {
                            emailError.textContent = '';
                            emailInput.classList.remove('error');
                        }
                        emailInput.classList.remove('success');
                        sendCodeBtn.disabled = true;
                    }
                    
                    // 只在用户已经发送过验证码后修改邮箱时才提示
                    if (hasSentCode && email !== currentEmail && currentEmail !== '') {
                        // 邮箱已更改，重置验证码状态
                        verificationInput.value = '';
                        codeValidIcon.classList.remove('valid');
                        verificationInput.classList.remove('success');
                        verificationInput.classList.remove('error');
                        verificationError.textContent = '邮箱已更改，请重新获取验证码';
                        hasSentCode = false; // 重置发送状态
                    }
                    
                    currentEmail = email;
                    updateNextButton();
                });
            }
            
            if (usernameInput) {
                // 用户名验证
                usernameInput.addEventListener('input', function() {
                    const username = this.value.trim();
                    
                    if (username.length < 2) {
                        usernameError.textContent = '用户名至少需要2个字符';
                        this.classList.add('error');
                    } else {
                        usernameError.textContent = '';
                        this.classList.remove('error');
                    }
                    
                    updateNextButton();
                });
            }
            
            if (phoneInput) {
                // 手机号验证
                phoneInput.addEventListener('input', function() {
                    const phone = this.value;
                    
                    if (validatePhone(phone)) {
                        phoneError.textContent = '';
                        phoneInput.classList.remove('error');
                        phoneInput.classList.add('success');
                        sendSmsCodeBtn.disabled = false;
                    } else {
                        if (phone !== '') {
                            phoneError.textContent = '请输入有效的手机号码';
                            phoneInput.classList.add('error');
                        } else {
                            phoneError.textContent = '';
                            phoneInput.classList.remove('error');
                        }
                        phoneInput.classList.remove('success');
                        sendSmsCodeBtn.disabled = true;
                    }
                    
                    // 只在用户已经发送过验证码后修改手机号时才提示
                    if (hasSentSmsCode && phone !== currentPhone && currentPhone !== '') {
                        // 手机号已更改，重置验证码状态
                        smsVerificationInput.value = '';
                        smsCodeValidIcon.classList.remove('valid');
                        smsVerificationInput.classList.remove('success');
                        smsVerificationInput.classList.remove('error');
                        smsVerificationError.textContent = '手机号已更改，请重新获取验证码';
                        hasSentSmsCode = false; // 重置发送状态
                    }
                    
                    currentPhone = phone;
                    updateNextButton();
                });
            }
            
            if (newPasswordInput) {
                // 新密码验证
                newPasswordInput.addEventListener('input', function() {
                    const password = this.value;
                    const isValid = checkPasswordStrength(password);
                    
                    if (!isValid && password.length > 0) {
                        newPasswordError.textContent = '密码不符合要求，请按照提示设置';
                        this.classList.add('error');
                    } else {
                        newPasswordError.textContent = '';
                        this.classList.remove('error');
                    }
                    
                    checkPasswordMatch();
                });
            }
            
            if (confirmNewPasswordInput) {
                // 确认新密码验证
                confirmNewPasswordInput.addEventListener('input', checkPasswordMatch);
            }
            
            if (newPasswordInput) {
                // 新密码输入时也更新按钮状态
                newPasswordInput.addEventListener('input', function() {
                    updateResetButton();
                });
            }
            
            // 页面初始化调试信息
            console.log('页面元素初始化完成');
            console.log('resetBtn:', resetBtn);
            console.log('resetForm:', resetForm);
            console.log('backBtn:', backBtn);
            console.log('nextBtn:', nextBtn);
            console.log('backToStep1Btn:', backToStep1Btn);
            
            // 安全检查：只有元素存在时才添加事件监听器
            if (nextBtn) {
                // 下一步按钮点击事件
                nextBtn.addEventListener('click', function() {
                    // 显示第二步，隐藏第一步
                    step1Form.style.display = 'none';
                    step2Form.style.display = 'block';
                    
                    // 更新步骤指示器
                    step1Indicator.classList.remove('active');
                    step1Indicator.classList.add('completed');
                    step2Indicator.classList.add('active');
                    
                    // 填充确认信息
                    confirmUsername.textContent = usernameInput.value;
                    confirmEmail.textContent = emailInput.value;
                    confirmPhone.textContent = document.getElementById('phone-area-code').value + '-' + phoneInput.value;
                    
                    // 更新重置按钮状态
                    updateResetButton();
                });
            } else {
                console.error('nextBtn 元素未找到！');
            }
            
            if (backToStep1Btn) {
                // 返回第一步按钮点击事件
                backToStep1Btn.addEventListener('click', function() {
                    // 显示第一步，隐藏第二步
                    step2Form.style.display = 'none';
                    step1Form.style.display = 'block';
                    
                    // 更新步骤指示器
                    step2Indicator.classList.remove('active');
                    step1Indicator.classList.add('active');
                    step1Indicator.classList.remove('completed');
                });
            } else {
                console.error('backToStep1Btn 元素未找到！');
            }
            
            if (backBtn) {
                // 返回登录按钮点击事件
                backBtn.addEventListener('click', function() {
                    window.location.href = '/login';
                });
            } else {
                console.error('backBtn 元素未找到！');
            }
            
            if (resetForm && resetBtn) {
                // 重置密码表单提交
                resetForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('重置密码表单被提交');
                    
                    // 保存原始按钮文本
                    const originalText = resetBtn.textContent;
                    
                    // 显示加载状态
                    resetBtn.disabled = true;
                    resetBtn.textContent = '重置中...';
                    
                    // 创建FormData对象
                    const formData = new FormData();
                    formData.append('user_id', userInfo.user_id || '');
                    formData.append('username', usernameInput.value);
                    formData.append('new_password', newPasswordInput.value);
                    formData.append('email', emailInput.value);
                    formData.append('verification_code', verificationInput.value);
                    formData.append('phone', document.getElementById('phone-area-code').value + '-' + phoneInput.value);
                    formData.append('sms_verification_code', smsVerificationInput.value);
                    
                    console.log('提交重置密码，userInfo:', userInfo);
                    console.log('表单数据:', {
                        user_id: userInfo.user_id || '',
                        username: usernameInput.value,
                        email: emailInput.value,
                        verification_code: verificationInput.value
                    });
                    
                    // 提交表单
                    fetch('/reset_password', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => {
                        console.log('响应状态:', response.status);
                        return response.text().then(text => {
                            console.log('响应文本:', text);
                            try {
                                return JSON.parse(text);
                            } catch (e) {
                                console.error('解析JSON失败:', e);
                                return { success: false, message: '服务器响应格式错误' };
                            }
                        });
                    })
                    .then(data => {
                        console.log('响应数据:', data);
                        if (data.success) {
                            alert('密码重置成功！');
                            // 跳转到登录页面
                            window.location.href = '/login';
                        } else {
                            alert('密码重置失败：' + data.message);
                            // 恢复按钮状态
                            resetBtn.disabled = false;
                            resetBtn.textContent = originalText;
                        }
                    })
                    .catch(error => {
                        console.error('错误:', error);
                        alert('密码重置失败，请稍后重试');
                        // 恢复按钮状态
                        resetBtn.disabled = false;
                        resetBtn.textContent = originalText;
                    });
                });
            } else {
                console.error('resetForm 或 resetBtn 元素未找到！');
            }
            
            if (resetBtn) {
                // 也为重置按钮添加点击事件（作为备用）
                resetBtn.addEventListener('click', function(e) {
                    if (!resetBtn.disabled) {
                        console.log('重置按钮被点击');
                        // 不做任何事，让表单提交事件处理
                    }
                });
            }
        });
    </script>
    <script src="/static/js/theme-toggle.js"></script>
</body>
</html>
