# ============================================
# SNYQT 统一账户认证系统 - Docker Compose
# ============================================
# 所有配置已硬编码在 config.py 中，无需环境变量
# 启动命令：docker-compose up -d
# 停止命令：docker-compose down
# ============================================

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: snyqt-account:latest
    container_name: snyqt-account
    restart: unless-stopped
    ports:
      - "80:5000"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s